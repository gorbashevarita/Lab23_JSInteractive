<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Профиль пользователя</h1>
    <form class="form" id="form">
        <input id="name" type="text" name="name" placeholder="Введите имя:" required>
        <input id="age" type="number" name="age" min="1" max="120" placeholder="Введите возраст:" required>
        <input id="town" type="text" name="town" placeholder="Введите город:" required>
        <input id="hobbi" type="text" name="hobbi" placeholder="Введите хобби:" required>
    </form>
    <button id="clean" class="button">Очистить данные</button>
    <button id="show" class="button">Показать данные</button>
    <p id="output" class="output"></p>
    <script src="main.js"></script>
</body>
</html>
