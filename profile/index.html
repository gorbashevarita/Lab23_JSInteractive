<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Профиль пользователя</h1>
    <form id="form" class="form">
        <label>Имя: <input type="text" name="name" required></label>
        <label>Возраст: <input type="number" name="age" min="1" max="120" required></label>
        <label>Город:<input type="text" name="town" required></label>
        <label>Хобби:<input type="text" name="hobbi" required></label>
    </form>
    <button id="clean" class="clean">Очистить данные</button>
    <script src="main.js"></script>
</body>
</html>
